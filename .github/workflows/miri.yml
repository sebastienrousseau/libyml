name: 🧪 Miri Test

on: [pull_request, push]

jobs:
  miri:
    name: Miri
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Rust with Miri component
      - name: Setup Rust with Miri
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: nightly
          components: miri
          override: true

      # Configure Cargo cache
      - name: Configure Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: miri-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      # Clean the build state
      - name: Clean build state
        run: cargo clean

      # Run Miri tests
      - name: Run Miri tests
        run: |
          MIRIFLAGS="-Zmiri-disable-isolation -Zmiri-ignore-leaks" cargo miri test --verbose | tee miri-test.log

      # Upload logs on failure
      - name: Upload Miri logs
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: miri-test-logs
          path: miri-test.log
