# cargo-deny config for the libyml deprecation shim.
#
# The shim's runtime tree is small: just `unsafe-libyaml`. The
# license allowlist below covers that surface.

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "Unicode-3.0",
    "Unlicense",
]

[bans]
multiple-versions = "warn"
highlight = "all"
skip = []
skip-tree = []

[advisories]
ignore = []
